        async function createUser(account, tenantMap) {
            try {
                const tenantId = account.tenantSlug ? tenantMap.get(account.tenantSlug) : null;

                const authResponse = await fetch(`${SUPABASE_URL}/auth/v1/admin/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                        'apikey': SERVICE_ROLE_KEY,
                    },
                    body: JSON.stringify({
                        email: account.email,
                        password: account.password,
                        email_confirm: true,
                        user_metadata: {
                            full_name: account.fullName,
                            tenant_slug: account.tenantSlug,
                        },
                    }),
                });

                if (!authResponse.ok) {
                    const error = await authResponse.json();
                    if (error.message?.includes('already registered')) {
                        log(`✓ Already exists: ${account.email}`, 'info');
                        return { status: 'existing', email: account.email };
                    }
                    throw new Error(`Auth error: ${error.message || JSON.stringify(error)}`);
                }

                const authData = await authResponse.json();
                log(`✓ Created: ${account.email}`, 'success');

                // Update profile
                const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${authData.id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                        'apikey': SERVICE_ROLE_KEY,
                        'Prefer': 'return=representation',

                    body: JSON.stringify({
                        full_name: account.fullName,
                        tenant_id: tenantId,
                    }),
                });

                // Create role assignment

                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                        'apikey': SERVICE_ROLE_KEY,
                        'Prefer': 'return=representation',
                    },
                    body: JSON.stringify({
                        user_id: authData.id,
                        role: account.role,
                        tenant_id: tenantId,
                    }),
                });

                return { status: 'created', email: account.email };
            } catch (error) {
                log(`✗ Failed: ${account.email} - ${error.message}`, 'error');
                return { status: 'error', email: account.email, error: error.message };
            }
        }

        async function createTenant(name, slug) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/tenants`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                    'apikey': SERVICE_ROLE_KEY,
                    'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, slug }),
            });

            if (response.ok) {
                const data = await response.json();
                return data[0];
            } else {
                const error = await response.json();
                if (error.message?.includes('duplicate')) {
                    log(`Tenant already exists: ${slug}`, 'info');
                    return null;
                }
                throw new Error(`Failed to create tenant: ${error.message}`);
            }
        }

        async function seedAccounts() {
            const btn = document.getElementById('seedBtn');
            btn.disabled = true;
            btn.textContent = 'Creating Accounts...';

            document.getElementById('status').innerHTML = '';
            log('🚀 Starting account seeding...\n');

            try {
                // Step 1: Create tenants
                log('📦 Creating tenants...');
                const tenants = [
                    { name: 'ServicePro Partners', slug: 'servicepro' },
                    { name: 'TechField Solutions', slug: 'techfield' },
                    { name: 'RepairHub Network', slug: 'repairhub' },
                    { name: 'FixIt Partners', slug: 'fixit' },

                    { name: 'Retail Client 1', slug: 'retail-client-1' },
                    { name: 'Healthcare Client 1', slug: 'healthcare-client-1' },
                ];

                const tenantMap = new Map();
                for (const tenant of tenants) {
                    try {
                        const tenantData = await createTenant(tenant.name, tenant.slug);
                        if (tenantData) {
                            tenantMap.set(tenant.slug, tenantData.id);
                            log(`✓ Created tenant: ${tenant.name}`, 'success');
                        }
                    } catch (error) {
                        log(`✗ Failed to create tenant ${tenant.slug}: ${error.message}`, 'error');
                    }
                }

                // Fetch existing tenants
                const existingTenantsResponse = await fetch(`${SUPABASE_URL}/rest/v1/tenants?select=id,slug`, {
                    headers: {
                        'Authorization': `Bearer ${SERVICE_ROLE_KEY}`,
                        'apikey': SERVICE_ROLE_KEY,
                    },
                });

                if (existingTenantsResponse.ok) {
                    const existingTenants = await existingTenantsResponse.json();
                    existingTenants.forEach(t => tenantMap.set(t.slug, t.id));
                }

                log('\n👥 Creating user accounts...\n');

                // Step 2: Create users
                const results = {
                    created: [],
                    existing: [],
                    errors: [],
                };

                for (const account of TEST_ACCOUNTS) {
                    const result = await createUser(account, tenantMap);
                    if (result.status === 'created') {
                        results.created.push(account.email);
                    } else if (result.status === 'existing') {
                        results.existing.push(account.email);
                    } else {
                        results.errors.push({ email: account.email, error: result.error });
                    }
                    await new Promise(resolve => setTimeout(resolve, 100));
                }

                // Summary
                log('\n' + '='.repeat(60), 'info');
                log('📊 SUMMARY', 'info');
                log('='.repeat(60), 'info');
                log(`✅ Created: ${results.created.length} accounts`, results.created.length > 0 ? 'success' : 'info');
                log(`ℹ️  Existing: ${results.existing.length} accounts`, 'info');
                log(`❌ Errors: ${results.errors.length} accounts`, results.errors.length > 0 ? 'error' : 'info');
                log('\n🎉 Seeding complete!', 'success');

                if (results.errors.length > 0) {
                    log('\nError details:', 'error');
                    results.errors.forEach(e => log(`  - ${e.email}: ${e.error}`, 'error'));
                }

                log('\n✅ You can now test login at your app!', 'success');
            } catch (error) {
                log(`\n❌ Fatal error: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create All Test Accounts';
            }
        }
